name: Coverage

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  # Allow triggering a coverage run manually from the Actions tab
  workflow_dispatch:
    inputs:
      fail_under:
        description: "Minimum coverage % (0 = disabled)"
        required: false
        default: "0"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Tarpaulin uses ptrace by default on Linux; keep test output readable.
  TARPAULIN_LOG: warn

jobs:
  coverage:
    name: cargo tarpaulin
    runs-on: ubuntu-latest          # ptrace engine requires Linux x86-64

    permissions:
      contents: read
      pull-requests: write          # needed to post a coverage comment on PRs

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Toolchain ───────────────────────────────────────────────────────────
      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # ── System dependencies ─────────────────────────────────────────────────
      - name: Install protoc
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y protobuf-compiler

      # ── Cargo cache ─────────────────────────────────────────────────────────
      - name: Cache cargo registry & build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-tarpaulin-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-tarpaulin-

      # ── Install cargo-tarpaulin ─────────────────────────────────────────────
      # We install via cargo-binstall (pre-built binary) for speed; fall back
      # to source compilation if the binary isn't available.
      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install cargo-tarpaulin
        run: cargo binstall --no-confirm cargo-tarpaulin

      # ── Run coverage ────────────────────────────────────────────────────────
      - name: Run cargo tarpaulin
        id: tarpaulin
        run: |
          cargo tarpaulin \
            --verbose \
            --workspace \
            --all-features \
            --engine ptrace \
            --timeout 300 \
            --test-threads 1 \
            --exclude-files "build.rs" \
            --out xml \
            --out html \
            --out lcov \
            --output-dir target/tarpaulin

      # ── Enforce minimum threshold (optional) ────────────────────────────────
      # Uncomment the block below (and update the percentage) once you have a
      # baseline you want to protect.  The workflow_dispatch input also lets
      # you override it ad-hoc without editing the file.
      #
      # - name: Enforce minimum coverage
      #   run: |
      #     THRESHOLD="${{ github.event.inputs.fail_under || '60' }}"
      #     cargo tarpaulin \
      #       --workspace --all-features --engine ptrace \
      #       --timeout 300 --test-threads 1 \
      #       --exclude-files "build.rs" \
      #       --fail-under "$THRESHOLD"

      # ── Upload reports as artifacts ──────────────────────────────────────────
      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-html
          path: target/tarpaulin/tarpaulin-report.html
          retention-days: 30

      - name: Upload LCOV coverage data
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-lcov
          path: target/tarpaulin/lcov.info
          retention-days: 30

      # ── Upload to Codecov ────────────────────────────────────────────────────
      # Sign up at https://codecov.io and add CODECOV_TOKEN to your repository
      # secrets (Settings → Secrets → Actions → New repository secret).
      # For public repositories the token is optional.
      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: target/tarpaulin/cobertura.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          verbose: true

      # ── Post a coverage summary to the job log ──────────────────────────────
      - name: Write coverage summary to job log
        if: always()
        run: |
          echo "## 📊 Coverage Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          # Extract the overall line-rate from the Cobertura XML.
          LINE_RATE=$(grep -m1 'line-rate' target/tarpaulin/cobertura.xml \
            | sed 's/.*line-rate="\([0-9.]*\)".*/\1/' || echo "0")
          PCT=$(awk "BEGIN { printf \"%.1f\", $LINE_RATE * 100 }")

          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ------ | ----- |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Line coverage | **${PCT}%** |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Full HTML report is available in the **coverage-report-html** artifact above." \
            >> "$GITHUB_STEP_SUMMARY"

      # ── Comment on PRs ───────────────────────────────────────────────────────
      - name: Post coverage comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const xml = fs.readFileSync('target/tarpaulin/cobertura.xml', 'utf8');
            const match = xml.match(/line-rate="([0-9.]+)"/);
            const pct = match ? (parseFloat(match[1]) * 100).toFixed(1) : '?';

            const emoji = pct >= 80 ? '🟢' : pct >= 60 ? '🟡' : '🔴';
            const body = [
              '## ' + emoji + ' Coverage Report',
              '',
              `**Line coverage: ${pct}%**`,
              '',
              'A full HTML report is attached as the `coverage-report-html` artifact on this workflow run.',
            ].join('\n');

            // Find and update an existing bot comment, or create a new one.
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(
              c => c.user.type === 'Bot' && c.body.includes('Coverage Report')
            );
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
