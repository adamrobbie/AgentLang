syntax = "proto3";
package agent;

service AgentService {
  rpc CallGoal (CallRequest) returns (CallResponse);
}

message CallRequest {
  string goal_name = 1;
  map<string, string> args = 2;
  string caller_id = 3;
  bytes signature = 4;
}

message CallResponse {
  string result_json = 1;
  bool success = 2;
}
